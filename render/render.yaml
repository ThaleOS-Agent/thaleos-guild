services:
  - type: web
    name: thaleos-api
    env: python
    rootDir: api
    buildCommand: pip install -U pip && pip install fastapi uvicorn pydantic pydantic-settings httpx
    startCommand: uvicorn thaleos_api.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health

  - type: web
    name: thaleos-web
    env: docker
    rootDir: .
    dockerfilePath: containers/Containerfile.web
    autoDeploy: true