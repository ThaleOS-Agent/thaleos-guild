services:
  - type: web
    name: thaleos-guild-api
    env: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: ACTIONS_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: ""

  - type: web
    name: thaleos-guild-router
    env: node
    rootDir: router
    buildCommand: npm ci
    startCommand: node server.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: ACTIONS_API_KEY
        fromService:
          type: web
          name: thaleos-guild-api
          envVarKey: ACTIONS_API_KEY
      - key: UPSTREAM_GUILD_API_URL
        fromService:
          type: web
          name: thaleos-guild-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: UPSTREAM_UTILIX_URL
        value: ""
