# docker-compose.yml (Podman-friendly)
services:
  bus:
    image: redis:7
    ports: ["6379:6379"]
  memory:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333","6334:6334"]
  thaleos-core:
    build: .
    environment:
      REDIS_URL: redis://bus:6379
      QDRANT_URL: http://memory:6333
    depends_on: [bus, memory]